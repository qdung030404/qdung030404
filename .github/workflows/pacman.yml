name: Generate Pacman contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: qdung030404
          outputs: |
            dist/breakout-contribution-graph.svg?palette=github
            dist/breakout-contribution-graph-dark.svg?palette=github-dark&color_snake=orange

      - uses: hugoReill/snake-animation-contribution@v1
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
